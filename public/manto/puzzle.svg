<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <!-- headline -->
  <text x="700" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="#ffffff">QUEBRA-CABEÇA DO MANTO</text>
  <text x="700" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#cbd5e1">Complete as peças e revele a camisa do Prosperidade FC</text>

  <!-- shirt silhouette -->
  <g filter="url(#shadow)">
    <path d="M540 240c40-30 70-50 110-50h100c40 0 70 20 110 50l70 55-55 75-55-40v320c0 35-25 60-60 60H615c-35 0-60-25-60-60V370l-55 40-55-75z" fill="url(#shirt)"/>
    <path d="M650 190c0 40 25 75 50 75s50-35 50-75" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.55"/>
  </g>

  <!-- puzzle grid overlay -->
  <g opacity="0.22" stroke="#ffffff" stroke-width="6">
    <rect x="520" y="240" width="360" height="520" fill="none" rx="24"/>
    <line x1="520" y1="370" x2="880" y2="370"/>
    <line x1="520" y1="500" x2="880" y2="500"/>
    <line x1="520" y1="630" x2="880" y2="630"/>
    <line x1="640" y1="240" x2="640" y2="760"/>
    <line x1="760" y1="240" x2="760" y2="760"/>
  </g>

  <!-- logo mark center -->
  <g transform="translate(700 520)">
    <circle r="68" fill="#ffffff" opacity="0.92"/>
    <circle r="62" fill="none" stroke="#22c55e" stroke-width="8"/>
    <text y="12" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="900" fill="#0f172a">PFC</text>
  </g>

  <!-- small instructions -->
  <text x="700" y="840" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#94a3b8">Dica: use as peças para montar a imagem completa da camisa</text>
</svg>
